site_name: ztxexp
site_description: Experiment framework for ML and LLM workflows
repo_url: https://github.com/ztxtech/ztxexp
repo_name: ztxtech/ztxexp
theme:
  name: material
  palette:
    scheme: default
    primary: blue grey
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Quickstart (ZH): quickstart.zh.md
  - Concepts (ZH): concepts.zh.md
  - Recipes (ZH): recipes.zh.md
  - Migration v0.2 (ZH): migration-v02.zh.md
  - English:
      - Overview: overview.en.md
      - Quickstart: quickstart.en.md
  - API Reference:
      - API Overview: api/index.md
      - Manager: api/manager.md
      - Runner: api/runner.md
      - Analyzer: api/analyzer.md
      - Pipeline: api/pipeline.md
      - Types: api/types.md
      - Environment: api/environment.md
      - Utils: api/utils.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
