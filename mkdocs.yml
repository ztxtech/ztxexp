site_name: ztxexp
site_description: 从源码注释自动生成的中文 API 文档
repo_url: https://github.com/ztxtech/ztxexp
repo_name: ztxtech/ztxexp
site_author: ztxtech

docs_dir: docs_src
site_dir: docs

theme:
  name: material
  language: zh
  logo: https://cdn.jsdelivr.net/gh/ztxtech/ztxexp@main/etc/images/favicon.png
  favicon: https://cdn.jsdelivr.net/gh/ztxtech/ztxexp@main/etc/images/favicon.png
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - 首页: index.md
  - 迁移指南: migration-v04.zh.md
  - 示例模板库: examples-lib/
  - API 参考: reference/

plugins:
  - search:
      lang:
        - zh
        - en
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            show_if_no_docstring: true
            heading_level: 2
            show_signature_annotations: true
            docstring_style: google
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

watch:
  - ztxexp
  - examples
  - README.md
