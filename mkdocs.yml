site_name: ztxexp
site_description: API docs generated from source comments/docstrings
repo_url: https://github.com/ztxtech/ztxexp
repo_name: ztxtech/ztxexp

docs_dir: docs_src
site_dir: docs

theme:
  name: material
  palette:
    scheme: default
    primary: blue grey
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - API Reference:
      - API Overview: api/index.md
      - Manager: api/manager.md
      - Runner: api/runner.md
      - Analyzer: api/analyzer.md
      - Pipeline: api/pipeline.md
      - Types: api/types.md
      - Environment: api/environment.md
      - Utils: api/utils.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            show_if_no_docstring: true
            heading_level: 2
            show_signature_annotations: true
            docstring_style: google

watch:
  - ztxexp
