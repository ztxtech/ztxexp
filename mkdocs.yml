site_name: ztxexp
site_description: 从源码注释自动生成的中文 API 文档
repo_url: https://github.com/ztxtech/ztxexp
repo_name: ztxtech/ztxexp

docs_dir: docs_src
site_dir: docs

theme:
  name: material
  palette:
    scheme: default
    primary: blue grey
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - 首页: index.md
  - API 参考: reference/

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            show_if_no_docstring: true
            heading_level: 2
            show_signature_annotations: true
            docstring_style: google

watch:
  - ztxexp
